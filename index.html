<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>烹飪排程與量化備料系統</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700;900&family=Noto+Sans+TC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-void: #FAF3E8;
            --bg-panel: #FFFDF9;
            --bg-panel-2: #F6EBDA;
            --bg-inset: #FBF5EA;
            --line: #E9DBC4;
            --line-soft: #F1E5D2;
            --text-hi: #4A3728;
            --text-mid: #8A7361;
            --text-dim: #B8A88F;
            --cyan: #C2694A;
            --cyan-dim: rgba(194, 105, 74, 0.12);
            --cyan-glow: rgba(194, 105, 74, 0.28);
            --amber: #D98E3F;
            --amber-dim: rgba(217, 142, 63, 0.14);
            --mint: #7C9473;
            --mint-dim: rgba(124, 148, 115, 0.14);
            --violet: #B07A8C;
            --red: #C2574A;
            --red-dim: rgba(194, 87, 74, 0.13);
            --radius: 10px;
            --mono: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            --serif: 'Noto Serif TC', 'Noto Sans TC', serif;
            --sans: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--sans);
        }

        ::selection { background: var(--cyan-glow); color: #fff; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 8px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--cyan); }

        body {
            display: flex;
            height: 100vh;
            background:
                radial-gradient(ellipse 900px 500px at 15% -10%, rgba(217,142,63,0.10), transparent 60%),
                radial-gradient(ellipse 700px 500px at 100% 10%, rgba(176,122,140,0.07), transparent 60%),
                linear-gradient(var(--bg-void), var(--bg-void));
            color: var(--text-hi);
        }

        .main-content {
            width: 75%;
            height: 100%;
            padding: 24px 28px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .sidebar {
            width: 25%;
            height: 100%;
            background: var(--bg-panel);
            border-left: 1px solid var(--line);
            padding: 22px;
            display: flex;
            flex-direction: column;
            box-shadow: -20px 0 40px rgba(74,55,40,0.05);
            overflow-y: auto;
            position: relative;
        }

        .sidebar::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 2px; height: 100%;
            background: linear-gradient(180deg, var(--cyan), transparent 40%, transparent 60%, var(--violet));
            opacity: 0.6;
        }

        header {
            margin-bottom: 18px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--line);
        }

        header h1 {
            font-family: var(--serif);
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            color: var(--text-hi);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header h1::before {
            content: '';
            width: 9px; height: 9px;
            border-radius: 50%;
            background: var(--mint);
            box-shadow: 0 0 8px 2px var(--mint-dim), 0 0 0 3px rgba(124,148,115,0.08);
            flex-shrink: 0;
            animation: pulse-dot 2.4s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        header .hint {
            color: var(--text-dim);
            font-size: 0.8rem;
            font-family: var(--sans);
        }

        .nav-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 16px;
        }

        .btn-nav {
            padding: 7px 14px;
            background-color: var(--bg-panel-2);
            border: 1px solid var(--line);
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: 600;
            font-family: var(--mono);
            color: var(--text-mid);
            transition: all 0.15s ease;
        }

        .btn-nav:hover {
            background-color: var(--cyan-dim);
            border-color: var(--cyan);
            color: var(--cyan);
        }

        .current-range-display {
            font-size: 0.9rem;
            font-weight: 600;
            font-family: var(--mono);
            color: var(--text-mid);
            letter-spacing: 0.01em;
        }

        .summary-panel {
            background: linear-gradient(180deg, var(--bg-panel-2), var(--bg-panel));
            border: 1px solid var(--line);
            border-left: 3px solid var(--cyan);
            border-radius: var(--radius);
            padding: 14px 16px;
            margin-bottom: 12px;
            display: none;
        }

        .summary-title {
            font-weight: 700;
            color: var(--cyan);
            margin-bottom: 10px;
            font-size: 0.85rem;
            font-family: var(--mono);
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .ingredients-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            list-style: none;
            font-size: 0.85rem;
        }

        .ingredient-tag {
            background-color: var(--bg-inset);
            border: 1px solid var(--cyan);
            padding: 6px 12px;
            border-radius: 6px;
            color: var(--cyan);
            font-weight: 600;
            font-family: var(--mono);
            font-size: 0.8rem;
        }

        .method-panel {
            background: linear-gradient(180deg, var(--bg-panel-2), var(--bg-panel));
            border: 1px solid var(--line);
            border-left: 3px solid var(--mint);
            border-radius: var(--radius);
            padding: 15px 20px;
            margin-bottom: 16px;
            display: none;
            max-height: 400px;
            overflow-y: auto;
        }

        .method-title {
            font-weight: 700;
            color: var(--mint);
            font-size: 0.85rem;
            font-family: var(--mono);
            text-transform: uppercase;
            letter-spacing: 0.02em;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--line-soft);
            padding-bottom: 8px;
        }

        .method-text {
            font-size: 0.92rem;
            line-height: 1.7;
            color: var(--text-mid);
            white-space: pre-line;
        }

        .week-header-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-bottom: 8px;
            text-align: center;
        }

        .weekday-label {
            font-weight: 700;
            font-size: 0.75rem;
            font-family: var(--mono);
            letter-spacing: 0.08em;
            color: var(--text-dim);
            padding: 7px 0;
            background-color: var(--bg-panel);
            border: 1px solid var(--line-soft);
            border-radius: 6px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .day-card {
            background: var(--bg-panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 10px;
            display: flex;
            flex-direction: column;
            min-height: 240px;
            cursor: pointer;
            transition: all 0.18s ease;
            position: relative;
        }

        .day-card:hover:not(.empty) {
            border-color: var(--cyan);
            box-shadow: 0 0 0 1px var(--cyan-glow), 0 8px 20px rgba(0,0,0,0.3);
            transform: translateY(-1px);
        }

        .day-card.active-select {
            border-color: var(--cyan);
            background-color: var(--bg-panel-2);
            box-shadow: 0 0 0 1px var(--cyan), 0 0 16px var(--cyan-glow);
        }

        .day-card.empty {
            background-color: var(--bg-inset);
            border: 1px dashed var(--line);
            opacity: 0.5;
            cursor: default;
        }

        .day-card.today {
            background-color: rgba(255, 159, 67, 0.05);
            border-color: var(--amber);
        }

        .day-card.today::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            border-radius: var(--radius);
            box-shadow: 0 0 14px rgba(255,159,67,0.25);
            pointer-events: none;
        }

        .day-title {
            font-weight: 700;
            font-size: 0.85rem;
            font-family: var(--mono);
            color: var(--text-hi);
            margin-bottom: 8px;
            border-bottom: 1px solid var(--line-soft);
            padding-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .day-title .badge {
            font-size: 0.65rem;
            font-family: var(--mono);
            font-weight: 700;
            background-color: var(--amber);
            color: #1a1206;
            padding: 2px 6px;
            border-radius: 3px;
            letter-spacing: 0.02em;
        }

        .meal-slot {
            margin-bottom: 5px;
            padding: 5px 6px;
            background-color: var(--bg-inset);
            border: 1px dashed var(--line);
            border-radius: 5px;
            min-height: 38px;
            transition: all 0.15s ease;
        }

        .meal-slot.drag-over {
            background-color: var(--cyan-dim);
            border-color: var(--cyan);
            border-style: solid;
        }

        .meal-slot-title {
            font-size: 0.62rem;
            font-family: var(--mono);
            color: var(--text-dim);
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 3px;
        }

        .placed-dish {
            background-color: var(--cyan-dim);
            border: 1px solid var(--cyan);
            color: var(--cyan);
            padding: 5px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 3px;
            cursor: grab;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .placed-dish .remove-btn {
            cursor: pointer;
            font-weight: bold;
            margin-left: 4px;
            padding: 0 2px;
            opacity: 0.6;
            color: var(--red);
        }

        .placed-dish .remove-btn:hover {
            opacity: 1;
        }

        .placed-dish .dish-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: pointer;
        }

        .section-title {
            font-size: 0.95rem;
            font-weight: 700;
            font-family: var(--mono);
            color: var(--text-hi);
            margin-bottom: 14px;
            margin-top: 20px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            width: 3px;
            height: 14px;
            background: var(--violet);
            border-radius: 2px;
            flex-shrink: 0;
        }

        .section-title:first-child {
            margin-top: 0;
        }

        .search-box {
            position: relative;
            margin-bottom: 10px;
        }

        .search-box input {
            width: 100%;
            padding: 8px 10px 8px 30px;
            background-color: var(--bg-inset);
            border: 1px solid var(--line);
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-hi);
            transition: border-color 0.15s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--cyan);
        }

        .search-box input::placeholder {
            color: var(--text-dim);
        }

        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.8rem;
            opacity: 0.6;
        }

        .dish-list-empty {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.85rem;
            padding: 20px 10px;
        }

        .category-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 5px 12px;
            background-color: var(--bg-inset);
            border: 1px solid var(--line);
            border-radius: 20px;
            font-size: 0.75rem;
            font-family: var(--mono);
            font-weight: 600;
            cursor: pointer;
            color: var(--text-mid);
            transition: all 0.15s ease;
        }

        .tab:hover {
            border-color: var(--cyan);
            color: var(--cyan);
        }

        .tab.active {
            background-color: var(--cyan);
            border-color: var(--cyan);
            color: #06222b;
        }

        .dish-list {
            height: 220px;
            overflow-y: auto;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 8px;
            background-color: var(--bg-inset);
            margin-bottom: 15px;
        }

        .dish-item {
            background-color: var(--bg-panel-2);
            padding: 9px 10px;
            margin-bottom: 6px;
            border-radius: 6px;
            border: 1px solid var(--line);
            border-left: 2px solid var(--violet);
            cursor: grab;
            font-size: 0.85rem;
            color: var(--text-hi);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.15s ease;
        }

        .dish-item:hover {
            border-color: var(--cyan);
            border-left-color: var(--cyan);
            background-color: var(--cyan-dim);
        }

        .dish-item .action-icons {
            display: flex;
            gap: 8px;
        }

        .dish-item .action-btn {
            cursor: pointer;
            color: var(--text-dim);
            font-size: 0.85rem;
            padding: 2px 4px;
            transition: color 0.2s;
        }

        .dish-item .action-btn.edit:hover {
            color: var(--cyan);
        }

        .dish-item .action-btn.delete:hover {
            color: var(--red);
        }

        .add-dish-form {
            border-top: 1px solid var(--line);
            padding-top: 8px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-family: var(--mono);
            color: var(--text-mid);
            margin-bottom: 5px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .form-group input[type="text"], .form-group input[type="number"], .form-group textarea {
            width: 100%;
            padding: 8px 10px;
            background-color: var(--bg-inset);
            border: 1px solid var(--line);
            border-radius: 5px;
            font-size: 0.88rem;
            color: var(--text-hi);
            transition: border-color 0.15s ease;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--cyan);
            box-shadow: 0 0 0 1px var(--cyan);
        }

        .form-group input::placeholder, .form-group textarea::placeholder {
            color: var(--text-dim);
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        .checkbox-label {
            font-size: 0.78rem;
            color: var(--text-mid);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .checkbox-label input[type="checkbox"] {
            accent-color: var(--cyan);
        }

        .btn-submit {
            width: 100%;
            padding: 11px;
            background: linear-gradient(180deg, var(--mint), #22b385);
            color: #06231a;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-family: var(--mono);
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: filter 0.15s ease;
        }

        .btn-submit:hover {
            filter: brightness(1.1);
        }

        .btn-cancel {
            width: 100%;
            padding: 7px;
            background-color: transparent;
            color: var(--text-dim);
            border: 1px solid var(--line);
            border-radius: 6px;
            font-size: 0.8rem;
            font-family: var(--mono);
            margin-top: 6px;
            cursor: pointer;
            display: none;
            transition: all 0.15s ease;
        }

        .btn-cancel:hover {
            border-color: var(--red);
            color: var(--red);
        }

        .ingredient-edit-row {
            display: flex;
            gap: 4px;
            margin-bottom: 6px;
            align-items: center;
        }
        .ingredient-edit-row input {
            padding: 6px 8px !important;
            background-color: var(--bg-inset);
            border: 1px solid var(--line);
            border-radius: 4px;
            font-size: 0.85rem !important;
            color: var(--text-hi);
        }
        .ingredient-edit-row input:focus {
            outline: none;
            border-color: var(--cyan);
        }
        .ing-name { flex: 2; width: 0; }
        .ing-qty { flex: 1; width: 0; }
        .ing-unit { flex: 1; width: 0; }
        .ing-del-btn {
            background: none;
            border: none;
            color: var(--red);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0 4px;
            line-height: 1;
            font-weight: bold;
            opacity: 0.7;
        }
        .ing-del-btn:hover {
            opacity: 1;
        }

        @media (max-width: 900px) {
            body {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
            }
            .main-content, .sidebar {
                width: 100%;
                height: auto;
            }
            .sidebar {
                border-left: none;
                border-top: 1px solid var(--line);
                box-shadow: none;
            }
            .sidebar::before {
                top: 0; left: 0;
                width: 100%; height: 2px;
                background: linear-gradient(90deg, var(--cyan), transparent 40%, transparent 60%, var(--violet));
            }
            .dish-list { height: 240px; }
        }

        @media (max-width: 640px) {
            .main-content { padding: 16px; }
            .sidebar { padding: 16px; }
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
            }
            .nav-controls {
                flex-wrap: wrap;
            }
            .week-header-grid { display: none; }
            .calendar-grid {
                grid-template-columns: 1fr;
            }
            .day-card { min-height: auto; }
            .checkbox-grid { grid-template-columns: repeat(2, 1fr); }
            .day-title .weekday-tag {
                display: inline;
            }
        }

        .day-title .weekday-tag {
            display: none;
            color: var(--text-dim);
            font-weight: 600;
            margin-left: 4px;
        }
    </style>
</head>
<body>

    <div class="main-content">
        <header>
            <h1>🍚 我家的烹飪排程與備料清單</h1>
            <span class="hint">拖曳菜色到排程格，會自動同步到雲端喔</span>
        </header>

        <div class="nav-controls">
            <button class="btn-nav" onclick="changeWeek(-14)">◀ 上雙週</button>
            <button class="btn-nav" onclick="goToday()">今天</button>
            <button class="btn-nav" onclick="changeWeek(14)">下雙週 ▶</button>
            <span class="current-range-display" id="currentRangeDisplay">載入中...</span>
        </div>

        <div class="summary-panel" id="summaryPanel">
            <div class="summary-title" id="summaryTitle">備料清單總計</div>
            <ul class="ingredients-list" id="ingredientsList"></ul>
        </div>
        
        <div class="method-panel" id="methodPanel">
            <div class="method-title" id="methodDishName">菜色名稱</div>
            <div class="method-text" id="methodContent">烹飪手法說明...</div>
        </div>
        
        <div class="week-header-grid">
            <div class="weekday-label">週一</div><div class="weekday-label">週二</div><div class="weekday-label">週三</div>
            <div class="weekday-label">週四</div><div class="weekday-label">週五</div><div class="weekday-label">週六</div>
            <div class="weekday-label">週日</div>
        </div>
        
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div class="sidebar">
        <div class="section-title">我的菜色庫</div>

        <div class="search-box">
            <input type="text" id="dishSearchInput" placeholder="搜尋菜色名稱..." oninput="handleDishSearch(this.value)">
        </div>

        <div class="category-tabs" id="categoryTabs">
            <button class="tab active" onclick="filterDishes('全部', this)">全部</button>
            <button class="tab" onclick="filterDishes('早餐', this)">早餐</button>
            <button class="tab" onclick="filterDishes('中餐', this)">中餐</button>
            <button class="tab" onclick="filterDishes('晚餐', this)">晚餐</button>
            <button class="tab" onclick="filterDishes('宵夜', this)">宵夜</button>
            <button class="tab" onclick="filterDishes('點心', this)">點心</button>
        </div>

        <div class="dish-list" id="dishList"></div>

        <div class="add-dish-form">
            <div class="section-title" id="formTitle">新增自訂菜色</div>
            <input type="hidden" id="editDishId" value="">
            
            <div class="form-group">
                <label for="dishName">菜色名稱</label>
                <input type="text" id="dishName" placeholder="例如：番茄炒蛋">
            </div>
            <div class="form-group">
                <label>歸類標籤 (可多選)</label>
                <div class="checkbox-grid">
                    <label class="checkbox-label"><input type="checkbox" name="tags" value="早餐"> 早餐</label>
                    <label class="checkbox-label"><input type="checkbox" name="tags" value="中餐"> 中餐</label>
                    <label class="checkbox-label"><input type="checkbox" name="tags" value="晚餐"> 晚餐</label>
                    <label class="checkbox-label"><input type="checkbox" name="tags" value="宵夜"> 宵夜</label>
                    <label class="checkbox-label"><input type="checkbox" name="tags" value="點心"> 點心</label>
                </div>
            </div>
            
            <div class="form-group">
                <label style="margin-bottom: 6px;">所需材料與量化</label>
                <div style="display: flex; gap: 4px; font-size: 0.75rem; color: var(--text-mid); font-weight: bold; margin-bottom: 4px; padding-left: 2px;">
                    <span style="flex: 2;">種類品項</span>
                    <span style="flex: 1;">數量</span>
                    <span style="flex: 1;">單位</span>
                    <span style="width: 20px;"></span>
                </div>
                <div id="ingredientRowContainer"></div>
                <button type="button" class="btn-nav" style="width: 100%; margin-top: 4px; margin-bottom: 10px; border-style: dashed; padding: 5px; font-size: 0.8rem;" onclick="addIngredientRow()">＋ 新增食材項目</button>
            </div>

            <div class="form-group">
                <label for="dishMethod">烹飪手法說明</label>
                <textarea id="dishMethod" rows="3" placeholder="請描述配方與煮法..."></textarea>
            </div>
            <button class="btn-submit" id="btnSubmit" onclick="saveDish()">加入菜色庫</button>
            <button class="btn-cancel" id="btnCancel" onclick="clearForm()">取消編輯</button>
        </div>
    </div>

    <script>
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxDiEtSRBnpNvSxCA6Ff-dEtBvm_dKkwNvKoGggD1AxuLXYmAtwS-yhd7z-jxYVGa6R/exec";

        let dishDatabase = [];
        let menuSchedule = {};
        let currentFilter = '全部';
        let searchQuery = '';
        let selectedDateKey = null;
        
        let calendarAnchorDate = new Date();

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = String(str ?? '');
            return div.innerHTML;
        }

        // 修改此處：相容新型 "dishId:倍率"、舊型純數字/字串格式及物件格式，皆只解析並回傳純 dishId 數字
        function getPlacementId(entry) {
            if (!entry) return null;
            if (typeof entry === 'object') return entry.id;
            const str = String(entry);
            return parseInt(str.split(':')[0], 10);
        }

        function updateSyncStatus(status, text) {
            let bar = document.getElementById('syncStatusBar');
            if (!bar) {
                bar = document.createElement('div');
                bar.id = 'syncStatusBar';
                bar.style = "position: fixed; top: 0; left: 0; width: 100%; text-align: center; font-size: 0.8rem; padding: 6px; z-index: 9999; font-weight: 700; font-family: 'Noto Sans TC', sans-serif; letter-spacing: 0.02em;";
                document.body.appendChild(bar);
            }
            if (status === 'loading') {
                bar.style.backgroundColor = 'rgba(217,142,63,0.16)'; bar.style.color = '#9c5f22'; bar.style.borderBottom = '1px solid rgba(217,142,63,0.4)'; bar.innerText = text || '⏳ 雲端資料同步中...';
            } else if (status === 'success') {
                bar.style.backgroundColor = 'rgba(124,148,115,0.18)'; bar.style.color = '#4f6b46'; bar.style.borderBottom = '1px solid rgba(124,148,115,0.4)'; bar.innerText = text || '✅ 雲端同步成功';
                setTimeout(() => bar.style.display = 'none', 2000);
            } else if (status === 'error') {
                bar.style.backgroundColor = 'rgba(194,87,74,0.16)'; bar.style.color = '#9c3d31'; bar.style.borderBottom = '1px solid rgba(194,87,74,0.4)'; bar.innerText = text || '❌ 同步失敗';
            }
            bar.style.display = 'block';
        }

        async function loadCloudData() {
            updateSyncStatus('loading', '⏳ 正在自 Google 試算表下載備料排程...');
            try {
                const response = await fetch(`${GAS_API_URL}?action=getData&_t=${Date.now()}`);
                const data = await response.json();
                
                if (data.status === 'error') {
                    throw new Error(data.error || '後端讀取失敗');
                }
                
                dishDatabase = data.dishes || [];
                menuSchedule = data.schedule || {};
                
                if (dishDatabase.length === 0) {
                    dishDatabase = [
                        { id: 1, name: "肉絲炒飯", tags: ["中餐", "晚餐"], ingredients: ["白飯300g", "豬肉絲120g", "雞蛋2顆", "蔥20g"], method: "大火熱油炒香肉絲，下蛋液與白飯快速翻炒。" },
                        { id: 2, name: "火腿蛋餅", tags: ["早餐", "宵夜"], ingredients: ["蛋餅皮1張", "雞蛋1顆", "火腿片1片"], method: "中火將餅皮煎至兩面微黃，倒入蛋液蓋上餅皮。" }
                    ];
                    await saveCloudData();
                }

                renderDishList();
                initCalendarView();
                updateSyncStatus('success', '✅ 雲端資料載入完成！');
            } catch (error) {
                console.error(error);
                updateSyncStatus('error', '❌ 無法載入雲端資料：' + error.message);
            }
        }

        async function saveCloudData() {
            updateSyncStatus('loading', '💾 正在同步更新至 Google 雲端...');
            try {
                const payload = JSON.stringify({
                    action: 'saveAll',
                    dishes: dishDatabase,
                    schedule: menuSchedule
                });

                const response = await fetch(GAS_API_URL, {
                    method: 'POST',
                    mode: 'cors', 
                    headers: { 'Content-Type': 'text/plain' },
                    body: payload
                });
                
                const result = await response.json();
                if (result && result.status === 'success') {
                    updateSyncStatus('success', '✅ 備料排程已安全存入雲端！');
                } else {
                    updateSyncStatus('error', '❌ 雲端回報儲存失敗：' + (result.message || '未知錯誤'));
                }
            } catch (error) {
                console.error(error);
                updateSyncStatus('error', '❌ 儲存至雲端失敗，請確認 GAS 專案是否已發布為新版本並設定為「任何人」皆可存取。');
            }
        }

        function formatDateKey(dateObj) {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function getScheduleData(dateKey, legacyKey) {
            if (menuSchedule[dateKey]) return menuSchedule[dateKey];
            if (legacyKey && menuSchedule[legacyKey]) {
                menuSchedule[dateKey] = menuSchedule[legacyKey];
                return menuSchedule[dateKey];
            }
            return null;
        }

        function parseAndAggregateIngredients(ingredientLists) {
            let totals = {};
            ingredientLists.forEach(ingredients => {
                (ingredients || []).forEach(str => {
                    if (!str) return;
                    const match = str.match(/^([^\d\s\.]+)([\d\.]+)?(.*)$/);
                    if (match) {
                        const name = match[1].trim();
                        const value = match[2] ? parseFloat(match[2]) : null;
                        const unit = match[3] ? match[3].trim() : '';

                        if (value !== null) {
                            if (!totals[name]) totals[name] = { value: 0, unit: unit };
                            totals[name].value += value;
                            if(unit) totals[name].unit = unit; 
                        } else {
                            if (!totals[name]) totals[name] = { value: null, unit: unit };
                        }
                    }
                });
            });

            let resultStrings = [];
            for (let name in totals) {
                if (totals[name].value !== null) {
                    const roundedValue = Math.round(totals[name].value * 100) / 100;
                    resultStrings.push(`${name} : ${roundedValue} ${totals[name].unit}`);
                } else {
                    resultStrings.push(`${name}`);
                }
            }
            return resultStrings;
        }

        function updateIngredientsSummary(dateKey, legacyKey) {
            const panel = document.getElementById('summaryPanel');
            const title = document.getElementById('summaryTitle');
            const listContainer = document.getElementById('ingredientsList');
            
            const displayDate = dateKey.substring(5).replace('-', '/');
            title.innerText = `📊 ${displayDate} 備料清單與食材量化加總`;
            listContainer.innerHTML = '';

            const dayMeals = getScheduleData(dateKey, legacyKey);
            let ingredientLists = [];
            let hasFood = false;

            if (dayMeals) {
                ['早餐', '中餐', '晚餐', '宵夜', '點心'].forEach(mealType => {
                    if (dayMeals[mealType] && dayMeals[mealType].length > 0) {
                        hasFood = true;
                        dayMeals[mealType].forEach(entry => {
                            const dishId = getPlacementId(entry);
                            const dish = dishDatabase.find(d => d.id === dishId);
                            if (dish && dish.ingredients) {
                                ingredientLists.push(dish.ingredients);
                            }
                        });
                    }
                });
            }

            if (!hasFood) {
                listContainer.innerHTML = '<li style="color: var(--text-dim); list-style: none; font-size: 0.85rem;">今天此日無排餐，無需備料</li>';
                panel.style.display = 'block';
                return;
            }

            let aggregatedIngredients = parseAndAggregateIngredients(ingredientLists);

            if(aggregatedIngredients.length === 0) {
                listContainer.innerHTML = '<li style="color: var(--text-dim); list-style: none; font-size: 0.85rem;">所選菜色未設定材料</li>';
            } else {
                aggregatedIngredients.forEach(ing => {
                    const li = document.createElement('li');
                    li.className = 'ingredient-tag';
                    li.innerText = ing;
                    listContainer.appendChild(li);
                });
            }
            panel.style.display = 'block';
        }

        function showDayCookingMethods(dateKey, legacyKey) {
            const dayMeals = getScheduleData(dateKey, legacyKey);
            const methodPanel = document.getElementById('methodPanel');
            const methodDishName = document.getElementById('methodDishName');
            const methodContent = document.getElementById('methodContent');
            
            if (!dayMeals) {
                methodPanel.style.display = 'none';
                return;
            }
            
            let bookedDishesMap = {};
            ['早餐', '中餐', '晚餐', '宵夜', '點心'].forEach(mealType => {
                if (dayMeals[mealType] && dayMeals[mealType].length > 0) {
                    dayMeals[mealType].forEach(entry => {
                        const dishId = getPlacementId(entry);
                        const dish = dishDatabase.find(d => d.id === dishId);
                        if (dish) {
                            if (!bookedDishesMap[dishId]) {
                                bookedDishesMap[dishId] = dish;
                            }
                        }
                    });
                }
            });
            
            const bookedDishes = Object.values(bookedDishesMap);

            if (bookedDishes.length === 0) {
                methodPanel.style.display = 'none';
                return;
            }
            
            methodPanel.style.display = 'block';
            const displayDate = dateKey.substring(5).replace('-', '/');
            methodDishName.innerText = `🍳 ${displayDate} 今日菜單做法彙整`;
            
            let fullMethodText = "";
            bookedDishes.forEach(dish => {
                fullMethodText += `【${dish.name}】\n材料：${dish.ingredients.join('、')}\n做法：${dish.method || "暫無說明。"}\n\n`;
            });
            
            methodContent.innerText = fullMethodText.trim();
        }

        function renderDishList() {
            const container = document.getElementById('dishList');
            container.innerHTML = '';
            const filtered = dishDatabase.filter(d => {
                const matchTag = currentFilter === '全部' || d.tags.includes(currentFilter);
                const matchSearch = searchQuery === '' || d.name.toLowerCase().includes(searchQuery);
                return matchTag && matchSearch;
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div class="dish-list-empty">${searchQuery ? `😶 找不到含「${escapeHtml(searchQuery)}」的菜色` : '尚無菜色，新增一道吧！'}</div>`;
                return;
            }

            filtered.forEach(dish => {
                const item = document.createElement('div');
                item.className = 'dish-item';
                item.setAttribute('draggable', 'true');
                item.innerHTML = `
                    <span onclick="showCookingMethod(${dish.id})" style="flex-grow: 1; cursor: pointer;">${escapeHtml(dish.name)}</span>
                    <div class="action-icons">
                        <span class="action-btn edit" onclick="editDish(${dish.id})" title="編輯">✏️</span>
                        <span class="action-btn delete" onclick="deleteDishFromDatabase(${dish.id})" title="刪除">🗑️</span>
                    </div>
                `;
                item.ondragstart = (e) => { e.dataTransfer.setData('text/plain', dish.id); };
                container.appendChild(item);
            });
        }

        function handleDishSearch(value) {
            searchQuery = value.trim().toLowerCase();
            renderDishList();
        }

        async function deleteDishFromDatabase(id) {
            const dish = dishDatabase.find(d => d.id === id);
            if (!dish) return;

            if (confirm(`確定要從菜色庫中刪除「${dish.name}」嗎？\n這將會同步移除日曆中所有已排定此菜色的行程！`)) {
                dishDatabase = dishDatabase.filter(d => d.id !== id);

                for (let dateKey in menuSchedule) {
                    for (let mealType in menuSchedule[dateKey]) {
                        if (Array.isArray(menuSchedule[dateKey][mealType])) {
                            menuSchedule[dateKey][mealType] = menuSchedule[dateKey][mealType].filter(entry => getPlacementId(entry) !== id);
                        }
                    }
                }

                const editId = document.getElementById('editDishId').value;
                if (editId == id) clearForm();

                const methodPanel = document.getElementById('methodPanel');
                if (methodPanel.style.display === 'block') methodPanel.style.display = 'none';

                renderDishList();
                renderCalendar();
                if (selectedDateKey) {
                    updateIngredientsSummary(selectedDateKey);
                    showDayCookingMethods(selectedDateKey);
                }
                
                await saveCloudData();
            }
        }

        function filterDishes(tag, button) {
            currentFilter = tag;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            button.classList.add('active');
            renderDishList();
        }

        function showCookingMethod(id) {
            const dish = dishDatabase.find(d => d.id === id);
            if (!dish) return;
            document.getElementById('methodPanel').style.display = 'block';
            document.getElementById('methodDishName').innerText = `🍳 ${dish.name} - 烹飪配方`;
            document.getElementById('methodContent').innerText = `【材料】\n${dish.ingredients.join('\n')}\n\n【做法】\n${dish.method || "暫無說明。"}`;
        }

        function addIngredientRow(name = "", qty = "", unit = "") {
            const container = document.getElementById('ingredientRowContainer');
            const row = document.createElement('div');
            row.className = 'ingredient-edit-row';
            row.innerHTML = `
                <input type="text" class="ing-name" placeholder="例如：蛋" value="${name}">
                <input type="number" step="any" class="ing-qty" placeholder="數量" value="${qty}">
                <input type="text" class="ing-unit" placeholder="例如：顆" value="${unit}">
                <button type="button" class="ing-del-btn" onclick="this.parentElement.remove()" title="刪除此項">×</button>
            `;
            container.appendChild(row);
        }

        function editDish(id) {
            const dish = dishDatabase.find(d => d.id === id);
            if (!dish) return;

            document.getElementById('formTitle').innerText = "📝 編輯菜色內容";
            document.getElementById('editDishId').value = dish.id;
            document.getElementById('dishName').value = dish.name;
            
            const container = document.getElementById('ingredientRowContainer');
            container.innerHTML = "";
            if (dish.ingredients && dish.ingredients.length > 0) {
                dish.ingredients.forEach(str => {
                    const match = str.match(/^([^\d\s\.]+)([\d\.]+)?(.*)$/);
                    if (match) {
                        const name = match[1] ? match[1].trim() : "";
                        const qty = match[2] ? match[2].trim() : "";
                        const unit = match[3] ? match[3].trim() : "";
                        addIngredientRow(name, qty, unit);
                    } else {
                        addIngredientRow(str, "", "");
                    }
                });
            } else {
                addIngredientRow();
            }

            document.getElementById('dishMethod').value = dish.method;

            document.querySelectorAll('input[name="tags"]').forEach(cb => {
                cb.checked = dish.tags.includes(cb.value);
            });

            document.getElementById('btnSubmit').innerText = "更新菜色配方";
            document.getElementById('btnCancel').style.display = "block";
        }

        async function saveDish() {
            const idVal = document.getElementById('editDishId').value;
            const name = document.getElementById('dishName').value.trim();
            const method = document.getElementById('dishMethod').value.trim();
            
            const checkboxes = document.querySelectorAll('input[name="tags"]:checked');
            let tags = [];
            checkboxes.forEach(cb => tags.push(cb.value));

            if (!name) { alert('請輸入菜色名稱！'); return; }

            const rows = document.querySelectorAll('.ingredient-edit-row');
            let ingredients = [];
            rows.forEach(row => {
                const ingName = row.querySelector('.ing-name').value.trim();
                const ingQty = row.querySelector('.ing-qty').value.trim();
                const ingUnit = row.querySelector('.ing-unit').value.trim();
                
                if (ingName) {
                    const combined = `${ingName}${ingQty}${ingUnit}`;
                    ingredients.push(combined);
                }
            });

            if (idVal) {
                const dish = dishDatabase.find(d => d.id === parseInt(idVal));
                if (dish) {
                    dish.name = name; dish.tags = tags; dish.ingredients = ingredients; dish.method = method;
                }
            } else {
                dishDatabase.push({ id: Date.now(), name, tags, ingredients, method });
            }

            clearForm();
            renderDishList();
            renderCalendar();
            if (selectedDateKey) {
                updateIngredientsSummary(selectedDateKey);
                showDayCookingMethods(selectedDateKey);
            }
            
            await saveCloudData();
        }

        function clearForm() {
            document.getElementById('formTitle').innerText = "新增自訂菜色";
            document.getElementById('editDishId').value = "";
            document.getElementById('dishName').value = "";
            
            document.getElementById('ingredientRowContainer').innerHTML = "";
            addIngredientRow(); 
            
            document.getElementById('dishMethod').value = "";
            document.querySelectorAll('input[name="tags"]').forEach(cb => cb.checked = false);
            document.getElementById('btnSubmit').innerText = "加入菜色庫";
            document.getElementById('btnCancel').style.display = "none";
        }

        function changeWeek(daysOffset) {
            calendarAnchorDate.setDate(calendarAnchorDate.getDate() + daysOffset);
            renderCalendar();
        }

        function goToday() {
            calendarAnchorDate = new Date();
            initCalendarView();
        }

        function initCalendarView() {
            const today = new Date();
            selectedDateKey = formatDateKey(today);
            renderCalendar();
            updateIngredientsSummary(selectedDateKey, `${today.getMonth()+1}/${today.getDate()}`);
            showDayCookingMethods(selectedDateKey, `${today.getMonth()+1}/${today.getDate()}`);
        }

        const WEEKDAY_NAMES = ['日', '一', '二', '三', '四', '五', '六'];

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            
            const startDate = new Date(calendarAnchorDate);
            const currentDay = startDate.getDay();
            const diffToMonday = currentDay === 0 ? -6 : 1 - currentDay; 
            startDate.setDate(startDate.getDate() + diffToMonday);
            
            const endDate = new Date(startDate);
            endDate.setDate(startDate.getDate() + 13);
            
            document.getElementById('currentRangeDisplay').innerText = 
                `📅 目前區間：${startDate.getFullYear()}/${startDate.getMonth()+1}/${startDate.getDate()} ～ ${endDate.getMonth()+1}/${endDate.getDate()}`;

            const mealTypes = ['早餐', '中餐', '晚餐', '宵夜', '點心'];
            const todayStr = formatDateKey(new Date());

            for (let i = 0; i < 14; i++) {
                const targetDate = new Date(startDate);
                targetDate.setDate(startDate.getDate() + i);
                
                const dateKey = formatDateKey(targetDate);
                const legacyKey = `${targetDate.getMonth() + 1}/${targetDate.getDate()}`;
                
                const isToday = dateKey === todayStr ? 'today' : '';
                const card = document.createElement('div');
                card.className = `day-card ${isToday}`;
                if(dateKey === selectedDateKey) card.classList.add('active-select');
                
                card.onclick = () => {
                    selectedDateKey = dateKey;
                    document.querySelectorAll('.day-card').forEach(c => c.classList.remove('active-select'));
                    card.classList.add('active-select');
                    updateIngredientsSummary(dateKey, legacyKey);
                    showDayCookingMethods(dateKey, legacyKey);
                };

                let todayBadge = dateKey === todayStr ? '<span class="badge">今天</span>' : '';
                card.innerHTML = `<div class="day-title"><span>${targetDate.getMonth()+1}/${targetDate.getDate()}<span class="weekday-tag">(${WEEKDAY_NAMES[targetDate.getDay()]})</span></span>${todayBadge}</div>`;
                
                if (!menuSchedule[dateKey]) {
                    if(menuSchedule[legacyKey]) {
                        menuSchedule[dateKey] = menuSchedule[legacyKey];
                    } else {
                        menuSchedule[dateKey] = { 早餐: [], 中餐: [], 晚餐: [], 宵夜: [], 點心: [] };
                    }
                }

                mealTypes.forEach(mealType => {
                    const slot = document.createElement('div');
                    slot.className = 'meal-slot';
                    slot.innerHTML = `<div class="meal-slot-title">${mealType}</div>`;
                    
                    slot.ondragover = (e) => { e.preventDefault(); slot.classList.add('drag-over'); };
                    slot.ondragleave = () => slot.classList.remove('drag-over');
                    
                    // 修改此處：拖曳加入新菜色時，直接存入純 dishId
                    slot.ondrop = async (e) => {
                        e.preventDefault();
                        slot.classList.remove('drag-over');
                        const dishId = parseInt(e.dataTransfer.getData('text/plain'));
                        
                        if (!menuSchedule[dateKey][mealType].some(entry => getPlacementId(entry) === dishId)) {
                            menuSchedule[dateKey][mealType].push(dishId);
                            renderCalendar();
                            if (dateKey === selectedDateKey) {
                                updateIngredientsSummary(dateKey, legacyKey);
                                showDayCookingMethods(dateKey, legacyKey);
                            }
                            await saveCloudData(); 
                        }
                    };

                    const placedEntries = menuSchedule[dateKey][mealType] || [];
                    placedEntries.forEach(entry => {
                        const dishId = getPlacementId(entry);
                        const dish = dishDatabase.find(d => d.id === dishId);
                        if (dish) {
                            const dishEl = document.createElement('div');
                            dishEl.className = 'placed-dish';
                            dishEl.innerHTML = `
                                <span class="dish-name" onclick="event.stopPropagation(); showCookingMethod(${dish.id})" title="${escapeHtml(dish.name)}">${escapeHtml(dish.name)}</span>
                                <span class="remove-btn" onclick="event.stopPropagation(); removeDishFromSchedule('${dateKey}', '${mealType}', ${dish.id})">×</span>
                            `;
                            slot.appendChild(dishEl);
                        }
                    });
                    card.appendChild(slot);
                });
                grid.appendChild(card);
            }
        }

        async function removeDishFromSchedule(dateKey, mealType, dishId) {
            if(menuSchedule[dateKey] && menuSchedule[dateKey][mealType]) {
                menuSchedule[dateKey][mealType] = menuSchedule[dateKey][mealType].filter(entry => getPlacementId(entry) !== dishId);
                renderCalendar();
                if (dateKey === selectedDateKey) {
                    const legacyKey = `${parseInt(dateKey.split('-')[1])}/${parseInt(dateKey.split('-')[2])}`;
                    updateIngredientsSummary(dateKey, legacyKey);
                    showDayCookingMethods(dateKey, legacyKey);
                }
                await saveCloudData(); 
            }
        }

        window.onload = () => {
            loadCloudData();
            clearForm(); 
        };
    </script>
</body>
</html>
